<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet Connector</title>
  <style>
    body { font-family: Arial, sans-serif; min-width: 240px; padding: 16px; }
    button { width: 100%; padding: 10px; font-size: 14px; }
    .actions { display: grid; gap: 8px; }
    .status { margin-top: 12px; font-size: 13px; color: #333; }
    .response { margin-top: 12px; font-size: 12px; color: #222; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h3>Google Meet Connector</h3>
  <div class="actions">
    <button id="enable-mic">Enable Microphone</button>
    <button id="start-rec">Start Audio Recording</button>
    <button id="stop-rec" disabled>Stop and Upload Audio</button>
  </div>
  <div class="status" id="status">Recorder is idle.</div>
  <div class="response" id="response"></div>
  <script src="popup.js"></script>
</body>
</html>
